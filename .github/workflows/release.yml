name: Release

# Publishes umbra-core to PyPI when a version tag is pushed (e.g. v0.1.0).
# Uses PyPI Trusted Publishing (OIDC) — no API token is stored as a secret.
#
# One-time setup on PyPI (https://pypi.org/manage/account/publishing/):
#   Project name:      umbra-core
#   Owner:             bkd-dotcom
#   Repository name:   umbra-core
#   Workflow name:     release.yml
#   Environment name:  pypi
#
# Then: git tag v0.1.0 && git push origin v0.1.0

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Verify the tag matches the package version
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PKG=$(grep -m1 '^version' pyproject.toml | sed -E 's/.*"([^"]+)".*/\1/')
          echo "tag=$TAG pkg=$PKG"
          if [ "$TAG" != "$PKG" ]; then
            echo "::error::Tag v$TAG does not match pyproject version $PKG"; exit 1
          fi

      - name: Test before publishing
        run: |
          uv sync --extra dev
          uv run ruff check .
          uv run pytest -q

      - name: Build sdist + wheel
        run: uv build

      - name: Check distribution metadata
        run: uvx twine check dist/*

      - name: Upload build artifacts
        uses: actions/upload-artifact@v5
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/umbra-core/
    permissions:
      id-token: write   # OIDC token for Trusted Publishing
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v5
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  github-release:
    needs: publish
    runs-on: ubuntu-latest
    permissions:
      contents: write   # create the GitHub Release
    steps:
      - uses: actions/checkout@v5

      - name: Download build artifacts
        uses: actions/download-artifact@v5
        with:
          name: dist
          path: dist/

      - name: Extract release notes from CHANGELOG
        id: notes
        run: |
          VER="${GITHUB_REF_NAME#v}"
          # Pull the section for this version from CHANGELOG.md (between its
          # "## [x.y.z]" heading and the next "## " heading).
          if [ -f CHANGELOG.md ]; then
            awk -v ver="$VER" '
              $0 ~ "^## \\[" ver "\\]" {grab=1; next}
              grab && /^## / {exit}
              grab {print}
            ' CHANGELOG.md > notes.md
          fi
          if [ ! -s notes.md ]; then
            echo "Release ${GITHUB_REF_NAME}. See CHANGELOG.md." > notes.md
          fi
          echo "Notes for ${GITHUB_REF_NAME}:"; cat notes.md

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            --title "umbra-core ${GITHUB_REF_NAME}" \
            --notes-file notes.md \
            --verify-tag \
            dist/* \
            || gh release edit "${GITHUB_REF_NAME}" --notes-file notes.md
